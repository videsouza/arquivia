<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ArquivIA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    body {
      font-family: "Inter", sans-serif;
      background: #f7f7f5;
      color: #1f2937;
      max-width: 860px;
      margin: auto;
      padding: 40px 20px;
      line-height: 1.8;
    }

    h1 {
      font-size: 42px;
      line-height: 1.3;
      margin-bottom: 20px;
      color: #111827;
    }

    .meta {
      margin-bottom: 30px;
      color: #6b7280;
    }

    .badge {
      display: inline-block;
      background: #eef2ff;
      color: #3730a3;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      margin-right: 10px;
    }

    .section {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 24px;
    }

    h2 {
      margin-bottom: 14px;
      font-size: 22px;
    }

    p {
      color: #374151;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 500;
    }

    .button:hover {
      background: #1d4ed8;
    }

    .back {
      display: inline-block;
      margin-bottom: 30px;
      color: #2563eb;
      text-decoration: none;
    }

  </style>

</head>

<body>

  <a href="./" class="back">
    ← Voltar
  </a>

  <div id="conteudo"></div>

  <script>

    const API =
      "https://mrshdawrgydietjhxixn.supabase.co/rest/v1/articles";

    const APIKEY =
      "sb_publishable_Wbv87CIIGPWJu-uSy2PvZg_sX9TU9vE";

    const params =
      new URLSearchParams(window.location.search);

    const id =
      params.get("id");

    async function carregar() {

      const resposta = await fetch(
        `${API}?id=eq.${id}&select=*`,
        {
          headers: {
            apikey: APIKEY
          }
        }
      );

      const dados =
        await resposta.json();

      const artigo =
        dados[0];

      const container =
        document.getElementById("conteudo");

      container.innerHTML = `

        <h1>
          ${artigo.titulo}
        </h1>

        <div class="meta">

          <span class="badge">
            ${artigo.revista}
          </span>

          <span class="badge">
            Artigo científico
          </span>

        </div>

        <div class="section">

          <h2>
            Sobre
          </h2>

          <p>
            Registro monitorado automaticamente
            pelo ArquivIA.
          </p>

          <a
            class="button"
            href="${artigo.link}"
            target="_blank"
          >
            Acessar publicação original
          </a>

        </div>

      `;

    }

    carregar();

  </script>

</body>

</html>
