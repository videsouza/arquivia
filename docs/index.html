<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>ArquivIA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      font-family: "Inter", sans-serif;

      background: #f7f7f5;

      color: #1f2937;

      max-width: 1200px;

      margin: auto;

      padding: 40px 20px;

    }

    header {

      margin-bottom: 40px;

    }

    h1 {

      font-size: 48px;

      margin-bottom: 12px;

      color: #111827;

    }

    .subtitle {

      color: #6b7280;

      font-size: 18px;

      line-height: 1.6;

    }

    /* =====================================
       DASHBOARD
    ===================================== */

    .dashboard {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(220px, 1fr));

      gap: 20px;

      margin-bottom: 40px;

    }

    .dashboard-card {

      background: white;

      border-radius: 20px;

      padding: 24px;

      border: 1px solid #e5e7eb;

    }

    .dashboard-number {

      font-size: 36px;

      font-weight: 700;

      margin-bottom: 10px;

      color: #2563eb;

    }

    .dashboard-label {

      color: #6b7280;

      font-size: 15px;

    }

    /* =====================================
       SEARCH
    ===================================== */

    .search-container {

      margin-bottom: 30px;

    }

    #search {

      width: 100%;

      padding: 18px 20px;

      border-radius: 18px;

      border: 1px solid #d1d5db;

      background: white;

      font-size: 16px;

      outline: none;

      transition: all 0.2s ease;

    }

    #search:focus {

      border-color: #2563eb;

      box-shadow:
        0 0 0 4px rgba(37, 99, 235, 0.1);

    }

    /* =====================================
       TAG FILTERS
    ===================================== */

    #tags-container {

      display: flex;

      flex-wrap: wrap;

      gap: 10px;

      margin-bottom: 40px;

    }

    .filter-tag {

      background: white;

      border: 1px solid #d1d5db;

      padding: 10px 14px;

      border-radius: 999px;

      cursor: pointer;

      transition: all 0.2s ease;

      font-size: 14px;

    }

    .filter-tag:hover {

      background: #eff6ff;

      border-color: #2563eb;

    }

    /* =====================================
       GRID
    ===================================== */

    #articles {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(340px, 1fr));

      gap: 24px;

    }

    /* =====================================
       CARD
    ===================================== */

    .article-card {

      background: white;

      border-radius: 24px;

      padding: 28px;

      border: 1px solid #e5e7eb;

      transition: all 0.2s ease;

    }

    .article-card:hover {

      transform: translateY(-4px);

      box-shadow:
        0 12px 30px rgba(0,0,0,0.06);

    }

    .article-title {

      font-size: 22px;

      line-height: 1.4;

      margin-bottom: 12px;

      color: #111827;

    }

    .article-date {

      font-size: 14px;

      color: #6b7280;

      margin-bottom: 18px;

    }

    .article-description {

      color: #4b5563;

      line-height: 1.7;

      margin-bottom: 22px;

    }

    .article-meta {

      display: flex;

      flex-wrap: wrap;

      gap: 10px;

      margin-bottom: 24px;

    }

    .badge {

      padding: 8px 12px;

      border-radius: 999px;

      font-size: 13px;

      font-weight: 500;

    }

    .category {

      background: #eef2ff;

      color: #3730a3;

    }

    .tag {

      background: #ecfeff;

      color: #155e75;

    }

    .journal {

      background: #f3f4f6;

      color: #374151;

    }

    .article-link {

      display: inline-block;

      text-decoration: none;

      background: #2563eb;

      color: white;

      padding: 12px 18px;

      border-radius: 14px;

      transition: all 0.2s ease;

      font-weight: 500;

    }

    .article-link:hover {

      background: #1d4ed8;

    }

  </style>

</head>

<body>

  <header>

    <h1>
      ArquivIA
    </h1>

    <p class="subtitle">

      Observatório científico de Arquivologia,
      Biblioteconomia e Ciência da Informação.

    </p>

  </header>

  <!-- =====================================
       DASHBOARD
  ====================================== -->

  <section class="dashboard">

    <div class="dashboard-card">

      <div
        class="dashboard-number"
        id="total-artigos"
      >
        --
      </div>

      <div class="dashboard-label">
        Artigos monitorados
      </div>

    </div>

    <div class="dashboard-card">

      <div
        class="dashboard-number"
        id="total-revistas"
      >
        --
      </div>

      <div class="dashboard-label">
        Revistas científicas
      </div>

    </div>

    <div class="dashboard-card">

      <div
        class="dashboard-number"
        id="total-categorias"
      >
        --
      </div>

      <div class="dashboard-label">
        Categorias temáticas
      </div>

    </div>

  </section>

  <!-- =====================================
       SEARCH
  ====================================== -->

  <div class="search-container">

    <input
      type="text"
      id="search"
      placeholder="Pesquisar artigos, temas, autores..."
    >

  </div>

  <!-- =====================================
       TAGS
  ====================================== -->

  <div id="tags-container"></div>

  <!-- =====================================
       ARTICLES
  ====================================== -->

  <section id="articles"></section>

  <script>

    const API =
      "https://mrshdawrgydietjhxixn.supabase.co/rest/v1/articles?select=*";

    const APIKEY =
      "SUA_ANON_KEY";

    let artigosGlobais = [];

    // =====================================
    // FORMATAR DATA
    // =====================================

    function formatarData(data) {

      if (!data) {
        return "Data desconhecida";
      }

      return new Date(data)
        .toLocaleDateString(
          "pt-BR",
          {
            day: "2-digit",
            month: "2-digit",
            year: "numeric"
          }
        );

    }

    // =====================================
    // DASHBOARD
    // =====================================

    function atualizarDashboard(artigos) {

      document.getElementById(
        "total-artigos"
      ).innerText = artigos.length;

      const revistas = new Set(
        artigos.map(a => a.revista)
      );

      document.getElementById(
        "total-revistas"
      ).innerText = revistas.size;

      const categorias = new Set(
        artigos.map(a => a.categoria)
      );

      document.getElementById(
        "total-categorias"
      ).innerText = categorias.size;

    }

    // =====================================
    // TAGS
    // =====================================

    function criarFiltrosTags() {

      const container =
        document.getElementById(
          "tags-container"
        );

      container.innerHTML = "";

      const tags = new Set();

      artigosGlobais.forEach(artigo => {

        if (artigo.tags_ia) {

          artigo.tags_ia.forEach(tag => {
            tags.add(tag);
          });

        }

      });

      tags.forEach(tag => {

        const div =
          document.createElement("div");

        div.className =
          "filter-tag";

        div.innerText =
          tag;

        div.onclick = () => {

          const filtrados =
            artigosGlobais.filter(
              artigo =>

                artigo.tags_ia &&
                artigo.tags_ia.includes(tag)

            );

          renderizar(filtrados);

        };

        container.appendChild(div);

      });

    }

    // =====================================
    // RENDER
    // =====================================

    function renderizar(artigos) {

      const container =
        document.getElementById(
          "articles"
        );

      container.innerHTML = "";

      artigos.forEach(artigo => {

        container.innerHTML += `

          <div class="article-card">

            <h2 class="article-title">
              ${artigo.titulo}
            </h2>

            <div class="article-date">
              ${formatarData(
                artigo.publicado_em
              )}
            </div>

            <p class="article-description">

              ${
                artigo.descricao_curta
                || "Artigo científico monitorado automaticamente."
              }

            </p>

            <div class="article-meta">

              <div class="badge journal">
                ${artigo.revista}
              </div>

              <div class="badge category">
                ${artigo.categoria || "Geral"}
              </div>

              ${
                artigo.tags_ia
                  ? artigo.tags_ia.map(tag => `

                    <div class="badge tag">
                      ${tag}
                    </div>

                  `).join("")
                  : ""
              }

            </div>

            <a
              class="article-link"
              href="article.html?id=${artigo.id}"
            >
              Abrir artigo
            </a>

          </div>

        `;

      });

      atualizarDashboard(artigos);

    }

    // =====================================
    // PESQUISA
    // =====================================

    document
      .getElementById("search")
      .addEventListener(
        "input",
        pesquisar
      );

    function pesquisar(evento) {

      const termo =
        evento.target.value.toLowerCase();

      const filtrados =
        artigosGlobais.filter(artigo => {

          const texto = `

            ${artigo.titulo || ""}

            ${artigo.autores || ""}

            ${artigo.categoria || ""}

            ${artigo.resumo_ia || ""}

            ${(artigo.tags_ia || []).join(" ")}

          `.toLowerCase();

          return texto.includes(termo);

        });

      renderizar(filtrados);

    }

    // =====================================
    // LOAD
    // =====================================

    async function carregar() {

      const resposta = await fetch(
        API,
        {
          headers: {
            apikey: APIKEY
          }
        }
      );

      const dados =
        await resposta.json();

      artigosGlobais = dados;

      renderizar(dados);

      criarFiltrosTags();

    }

    carregar();

  </script>

</body>

</html>
