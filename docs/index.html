<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>ArquivIA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Inter", sans-serif;
  background: #f7f7f5;
  color: #1f2937;
  min-height: 100vh;
  padding: 40px 20px;
}

.container {
  max-width: 960px;
  margin: auto;
}

header {
  margin-bottom: 50px;
}

h1 {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: -2px;
  margin-bottom: 12px;
  color: #111827;
}

.subtitle {
  font-size: 18px;
  color: #4b5563;
  line-height: 1.7;
  max-width: 760px;
}

.stats {
  display: flex;
  gap: 18px;
  margin-top: 28px;
  flex-wrap: wrap;
}

.stat-box {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  padding: 18px 22px;
  min-width: 180px;
}

.stat-number {
  font-size: 28px;
  font-weight: 700;
  color: #111827;
}

.stat-label {
  margin-top: 4px;
  color: #6b7280;
  font-size: 14px;
}

.articles {
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.card {
  background: white;
  border-radius: 18px;
  padding: 28px;
  border: 1px solid #e5e7eb;
  transition: all 0.2s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.06);
}

.article-title {
  font-size: 24px;
  line-height: 1.5;
  font-weight: 600;
  margin-bottom: 14px;
  color: #111827;
}

.article-meta {
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 20px;
}

.article-link {
  display: inline-block;
  text-decoration: none;
  background: #2563eb;
  color: white;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  transition: background 0.2s ease;
}

.article-link:hover {
  background: #1d4ed8;
}

footer {
  margin-top: 70px;
  text-align: center;
  color: #9ca3af;
  font-size: 14px;
}

@media (max-width: 700px) {

  body {
    padding: 24px 14px;
  }

  h1 {
    font-size: 38px;
  }

  .article-title {
    font-size: 20px;
  }

}

</style>
</head>

<body>

  <div class="container">

    <header>

      <h1>ArquivIA</h1>

      <p class="subtitle">
        Plataforma de monitoramento científico em Arquivologia,
        Biblioteconomia e Ciência da Informação.
      </p>

      <div class="stats">

        <div class="stat-box">
          <div class="stat-number" id="total-artigos">0</div>
          <div class="stat-label">Artigos monitorados</div>
        </div>

        <div class="stat-box">
          <div class="stat-number">24h</div>
          <div class="stat-label">Atualização automática</div>
        </div>

      </div>

    </header>

    <main class="articles" id="artigos"></main>

    <footer>
      ArquivIA · Observatório Científico
    </footer>

  </div>

  <script>

    const API =
      "https://mrshdawrgydietjhxixn.supabase.co/rest/v1/articles?select=*&order=criado_em.desc";

    const APIKEY =
      "sb_publishable_Wbv87CIIGPWJu-uSy2PvZg_sX9TU9vE";

    async function carregar() {

      const resposta = await fetch(API, {
        headers: {
          apikey: APIKEY
        }
      });

      const dados = await resposta.json();

      document.getElementById("total-artigos").innerText =
        dados.length;

      const container =
        document.getElementById("artigos");

      dados.forEach(artigo => {

        const div = document.createElement("div");

        div.className = "card";

        div.innerHTML = `
          <div class="article-title">
            ${artigo.titulo}
          </div>

          <div class="article-meta">
            ${artigo.revista}
          </div>

          <a
            class="article-link"
            href="${artigo.link}"
            target="_blank"
          >
            Ler artigo
          </a>
        `;

        container.appendChild(div);

      });

    }

    carregar();

  </script>

</body>

</html>
