<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>ArquivIA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background: #f7f7f5;
      color: #1f2937;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 980px;
      margin: auto;
    }

    header {
      margin-bottom: 50px;
    }

    h1 {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -2px;
      color: #111827;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 18px;
      line-height: 1.7;
      color: #4b5563;
      max-width: 760px;
    }

    .stats {
      display: flex;
      gap: 18px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .stat-box {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px 22px;
      min-width: 180px;
    }

    .stat-number {
      font-size: 30px;
      font-weight: 700;
    }

    .stat-label {
      margin-top: 4px;
      color: #6b7280;
      font-size: 14px;
    }

    .search-container {
      margin-bottom: 35px;
    }

    .search-input {
      width: 100%;
      padding: 18px 20px;
      border-radius: 16px;
      border: 1px solid #d1d5db;
      background: white;
      font-size: 16px;
      outline: none;
      transition: all 0.2s ease;
    }

    .search-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.08);
    }

    .articles {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      border: 1px solid #e5e7eb;
      padding: 30px;
      transition: all 0.25s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.07);
    }

    .article-title {
      font-size: 24px;
      line-height: 1.5;
      font-weight: 600;
      margin-bottom: 16px;
      color: #111827;
    }

    .article-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .badge {
      background: #eef2ff;
      color: #3730a3;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
    }

    .article-link {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 11px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .article-link:hover {
      background: #1d4ed8;
    }

    .tag {
      background: #ecfeff;
      color: #155e75;
    }

    .category {
      background: #eef2ff;
      color: #3730a3;
    }

  .tag {
      background: #ecfeff;
      color: #155e75;
  }

    footer {
      margin-top: 80px;
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
    }

    @media (max-width: 700px) {

      body {
        padding: 24px 14px;
      }

      h1 {
        font-size: 40px;
      }

      .article-title {
        font-size: 20px;
      }

      .card {
        padding: 22px;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <header>

      <h1>ArquivIA</h1>

      <p class="subtitle">
        Observatório científico em Arquivologia,
        Biblioteconomia e Ciência da Informação.
      </p>

      <div class="stats">

        <div class="stat-box">
          <div class="stat-number" id="total-artigos">0</div>
          <div class="stat-label">Artigos monitorados</div>
        </div>

        <div class="stat-box">
          <div class="stat-number">Automático</div>
          <div class="stat-label">Monitoramento contínuo</div>
        </div>

      </div>

    </header>

    <div class="search-container">
      <input
        type="text"
        class="search-input"
        id="busca"
        placeholder="Pesquisar artigos..."
      >
    </div>

    <main class="articles" id="artigos"></main>

    <footer>
      © 2026 Vinícius A. de Souza · ArquivIA · Plataforma de Inteligência Científica
    </footer>

  </div>

  <script>

    const API =
      "https://mrshdawrgydietjhxixn.supabase.co/rest/v1/articles?select=*&order=criado_em.desc";

    const APIKEY =
      "sb_publishable_Wbv87CIIGPWJu-uSy2PvZg_sX9TU9vE";

    let artigosGlobais = [];

    async function carregar() {

      const resposta = await fetch(API, {
        headers: {
          apikey: APIKEY
        }
      });

      const dados = await resposta.json();

      artigosGlobais = dados;

      document.getElementById("total-artigos").innerText =
        dados.length;

      renderizar(dados);

    }

    function renderizar(lista) {

      const container =
        document.getElementById("artigos");

      container.innerHTML = "";

      lista.forEach(artigo => {

        const div = document.createElement("div");

        div.className = "card";

        div.innerHTML = `
          <div class="article-title">
            ${artigo.titulo}
          </div>

          <div class="article-meta">

  <div class="badge">
    ${artigo.revista}
  </div>

  <div class="badge category">
    ${artigo.categoria || "Geral"}
  </div>

  ${
    artigo.tags_ia
      ? artigo.tags_ia.map(tag => `
        <div class="badge tag">
          ${tag}
        </div>
      `).join("")
      : ""
  }

</div>

          <a
  class="article-link"
  href="article.html?id=${artigo.id}"
>
  Abrir artigo
</a>
        `;

        container.appendChild(div);

      });

    }

    document
      .getElementById("busca")
      .addEventListener("input", (e) => {

        const termo =
          e.target.value.toLowerCase();

        const filtrados =
          artigosGlobais.filter(artigo =>
            artigo.titulo
              .toLowerCase()
              .includes(termo)
          );

        renderizar(filtrados);

      });

  function renderizarTags(tags) {

  if (!tags || tags.length === 0) {
    return "";
  }

  return tags.map(tag => `
    <div class="badge tag">
      ${tag}
    </div>
  `).join("");

}
    
    carregar();

  </script>

</body>

</html>
